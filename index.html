
<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Fe NET - تسجيل الدخول</title>
<style>
body {font-family: 'Arial', sans-serif; background:linear-gradient(135deg, #0a0a0a, #001a33); color:white; text-align:center; padding:30px; margin:0;}
.box {background:#111a22; padding:35px; border-radius:20px; max-width:400px; margin:auto; border:2px solid #00aaff; box-shadow: 0 0 20px #00aaff44;}
img {width:120px; border-radius:50%; border:4px solid #00aaff; box-shadow: 0 0 15px #00aaff;}
h1 {color:#00aaff; font-size:26px; margin:15px 0;}
.marquee {background:#00aaff; color:#000; padding:10px; border-radius:10px; font-weight:bold; font-size:16px; margin-bottom:15px; overflow:hidden;}
.marquee span {display:inline-block; padding-right:100%; animation: marquee 8s linear infinite;}
@keyframes marquee {0% { transform: translateX(100%); } 100% { transform: translateX(-100%); }}
input {width:90%; padding:12px; margin:10px 0; border-radius:10px; border:2px solid #00aaff; background:#0a141d; color:white; font-size:16px; text-align:right;}
button {background:#00aaff; color:#000; border:none; padding:14px 28px; border-radius:12px; font-size:18px; font-weight:bold; margin:10px; width:90%; cursor:pointer;}
</style>
</head>
<body>
<div class="box">
  <img src="logo.jpg" alt="Fe NET">
  <h1>Fe NET</h1>
  <div class="marquee">
    <span>اهلا بكم في شبكة الدعمة - اسرع انترنت في غزة 🚀</span>
  </div>
  <form>
    <input type="text" placeholder="اسم المستخدم" required>
    <input type="password" placeholder="كلمة المرور" required>
    <button type="submit">دخول</button>
  </form>
  <p><b>للشحن والدعم:</b></p>
  <a href="tel:0567198814"><button>اتصل بالدعم 0567198814</button></a>
</div>
</body>
</html>
